services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sar-backend
    volumes:
      - ../sample-data:/data:ro
      - ../uploads:/uploads
    environment:
      - SAR_DATA_DIR=/data
      - SAR_UPLOADS_DIR=/uploads
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8100:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sar-frontend
    ports:
      - "8180:80"
    depends_on:
      - backend
    restart: unless-stopped
